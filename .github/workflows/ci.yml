name: ci
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  # Runs on every push and PR.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so `git describe` works
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  # Builds release artifacts. UPX-packs amd64 only (arm64 UPX support is less
  # reliable, so that artifact ships uncompressed). On a v* tag it also creates
  # the GitHub Release; otherwise artifacts are just uploaded for inspection.
  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create the Release and upload assets
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # tags needed for version stamping
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: derive version
        id: ver
        run: |
          VERSION="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
          COMMIT="$(git rev-parse --short=12 HEAD 2>/dev/null || true)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT"   >> "$GITHUB_OUTPUT"
          echo "date=$DATE"       >> "$GITHUB_OUTPUT"
          echo "Building $VERSION ($COMMIT)"

      - name: build static binary (version-stamped)
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          PKG: github.com/manticore-projects/aurscan/internal/version
        run: |
          go build -trimpath \
            -ldflags="-s -w \
              -X ${PKG}.Version=${{ steps.ver.outputs.version }} \
              -X ${PKG}.Commit=${{ steps.ver.outputs.commit }} \
              -X ${PKG}.Date=${{ steps.ver.outputs.date }}" \
            -o aurscan-linux-${{ matrix.goarch }} ./cmd/aurscan

      - name: verify version stamp (amd64)
        if: matrix.goarch == 'amd64'
        run: ./aurscan-linux-amd64 --version

      - name: compress with upx (amd64 only)
        if: matrix.goarch == 'amd64'
        run: |
          sudo apt-get update && sudo apt-get install -y upx-ucl
          upx --best --lzma aurscan-linux-${{ matrix.goarch }}
          upx -t aurscan-linux-${{ matrix.goarch }}

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurscan-linux-${{ matrix.goarch }}
          path: aurscan-linux-${{ matrix.goarch }}

      - name: attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: aurscan-linux-${{ matrix.goarch }}

  # Publishes a signed SHA256SUMS covering BOTH release binaries so downstream
  # consumers can verify the bytes they download against the project's GPG key
  # (the same key that signs the release tags). Runs only on v* tags, after both
  # matrix legs of `release` have built and attached their binaries (#31).
  sign:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # to attach the checksums + signature to the Release
    steps:
      - name: download built binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true # flatten both per-arch artifacts into dist/

      - name: generate SHA256SUMS
        working-directory: dist
        run: |
          sha256sum aurscan-linux-amd64 aurscan-linux-arm64 > SHA256SUMS
          echo "---- SHA256SUMS ----"; cat SHA256SUMS

      - name: import signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::error::GPG_PRIVATE_KEY secret is not set; cannot sign release assets (#31)."
            exit 1
          fi
          export GNUPGHOME="$(mktemp -d)"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          echo "allow-loopback-pinentry" > "$GNUPGHOME/gpg-agent.conf"
          gpgconf --kill gpg-agent || true
          printf '%s\n' "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: sign SHA256SUMS (detached, armored)
        working-directory: dist
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }} # e.g. 188331308EF56D11, or a dedicated CI subkey
        run: |
          gpg --batch --yes --pinentry-mode loopback \
            ${GPG_PASSPHRASE:+--passphrase "$GPG_PASSPHRASE"} \
            ${GPG_KEY_ID:+--local-user "$GPG_KEY_ID"} \
            --armor --detach-sign --output SHA256SUMS.asc SHA256SUMS
          gpg --verify SHA256SUMS.asc SHA256SUMS

      - name: attach checksums + signature to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/SHA256SUMS
            dist/SHA256SUMS.asc
